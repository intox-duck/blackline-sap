<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — BlackLine</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Figtree',system-ui,sans-serif;background:#F8F8FA;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border:1px solid #E2E2E8;border-radius:16px;padding:40px;width:100%;max-width:460px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 0 0 1px rgba(0,0,0,.03)}
.brand-lockup{display:flex;align-items:flex-end;justify-content:center;gap:12px;flex-wrap:nowrap;margin-bottom:24px}
.brand-lockup img{height:40px;width:auto;display:block;flex:0 0 auto}
h1{font-size:22px;font-weight:700;color:#1A1A2E;margin-bottom:6px}
p.sub{font-size:14px;color:#8E8EA0;margin-bottom:28px}
label{display:block;font-size:13px;font-weight:600;color:#4A4A62;margin-bottom:6px}
input{width:100%;padding:10px 14px;border:1px solid #E2E2E8;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border .15s}
input:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.field{margin-bottom:18px}
button{width:100%;padding:12px;background:#2563EB;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s}
button:hover{background:#1d4ed8}
button:disabled{opacity:.6;cursor:not-allowed}
.error{color:#DC2626;font-size:13px;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="brand-lockup">
    <img src="blackline.png" alt="BlackLine">
    <img src="x.png" alt="" aria-hidden="true">
    <img src="C2 - Talent Intelligence -G.png" alt="Chapter 2 Talent Intelligence">
  </div>
  <h1>Sign in</h1>
  <p class="sub">Enter your credentials to continue.</p>
  <form id="loginForm">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@company.com">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter password">
    </div>
    <button type="submit" id="btn">Sign in</button>
    <div class="error" id="error">Invalid email or password.</div>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    if (res.ok) {
      window.location.href = '/SAP_Talent_Intelligence_BlackLine.html';
    } else {
      err.style.display = 'block';
    }
  } catch {
    err.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = 'Sign in';
});
</script>
</body>
</html>
